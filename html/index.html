<!DOCTYPE HTML>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incubator</title>
    <style>
		html {font-family: Arial; display: inline-block; text-align: center;}
		h1 {font-size: 2.9rem;}
		h2 {font-size: 2.1rem;}
		p {font-size: 1.9rem;}
    body{background-color:lightgreen;font-size:24px;}
		.slider { -webkit-appearance: none; margin: 14px; width: 400px; height: 15px; border-radius: 5px; background: #39a6de; outline: none; -webkit-transition: .2s; transition: opacity .2s;}
		.slider::-webkit-slider-thumb {-webkit-appearance: none; appearance: none; width: 25px; height: 25px; border-radius: 12px; background: #f74d4d; cursor: pointer;}
		.slider::-moz-range-thumb { width: 25px; height: 25px; border-radius: 12px; background: #F74D4D; cursor: pointer; } 
    </style>
</head>
<body>
	<h1>PWM Slider Control</h1>
	
	<h2>RGB Brightness</h2>
	
  TargetTemperature:<input type="range" onchange="updateTargetTemp()" id="pwmTargetTemp" min="20" max="35" value="25" step="1" class="slider">
	<span id="textTargetTemp">23</span><br>

  <script>
    function updateTargetTemp()
    {
      console.log("updateTargetTemp");
	    var TempSliderValue = document.getElementById("pwmTargetTemp").value;
	    document.getElementById("textTargetTemp").innerHTML = TempSliderValue;
      var xhttp = new XMLHttpRequest();
      xhttp.open("POST", "/post?TargetTemperature="+TempSliderValue, true);
      xhttp.send();
    }

</script>
</body>

</html>
